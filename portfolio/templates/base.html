<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}OpenInvest Monitor{% endblock %}</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Plotly CDN -->
    <script src="https://cdn.jsdelivr.net/npm/plotly.js-dist@2.27.0/plotly.min.js"></script>
    <style>
        body {
            background-color: #f4f6f9; /* Мягкий фон для контраста с островами */
            color: #2b2d42;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            padding-bottom: 40px;
        }

        /* Стилизация панелей (Островов) */
        .card, .island {
            background-color: #ffffff;
            border: none;
            border-radius: 24px;
            box-shadow: 0 8px 24px rgba(149, 157, 165, 0.1);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-bottom: 24px;
            overflow: hidden;
        }

        .card:hover, .island:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(149, 157, 165, 0.15);
        }

        .card-header {
            background-color: transparent !important;
            border-bottom: none;
            padding: 24px 24px 0 24px;
        }

        .card-body {
            padding: 24px;
        }

        /* Навигационная панель как остров */
        .navbar-island {
            background-color: #ffffff;
            border-radius: 24px;
            box-shadow: 0 8px 24px rgba(149, 157, 165, 0.1);
            margin: 20px auto 30px auto;
            padding: 12px 24px;
            max-width: calc(100% - 40px);
        }

        h1, h2, h3, h4, h5, h6 {
            font-weight: 700;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-md navbar-light navbar-island fixed-top position-sticky">
    <div class="container-fluid px-0">
        <a class="navbar-brand fw-bold" style="color: #2b2d42;" href="{% url 'portfolio:dashboard' %}">OpenInvest</a>
        <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarCollapse">
            <ul class="navbar-nav ms-auto mb-2 mb-md-0 fw-semibold">
                <li class="nav-item">
                    <a class="nav-link px-3" href="{% url 'portfolio:dashboard' %}">Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link px-3" href="{% url 'portfolio:transactions' %}">Transactions</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-2">
    {% block content %}
    {% endblock %}
</div>

<!-- Bootstrap Bundle with Popper -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
